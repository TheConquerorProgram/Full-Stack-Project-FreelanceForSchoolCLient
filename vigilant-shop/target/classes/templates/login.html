<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VIGILANT | Admin Access</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
    .cyber-border { clip-path: polygon(0 0, 100% 0, 100% 85%, 95% 100%, 0 100%); }
</style>
</head>
<body class="bg-[#0a0a0c] font-['Public_Sans'] text-slate-100 h-screen flex items-center justify-center">

<div class="bg-[#111114] p-10 max-w-md w-full cyber-border border-t-4 border-[#ff003c]">
    <h1 class="text-[#ff003c] text-3xl font-black uppercase tracking-tighter mb-2">System_Access</h1>
    <p class="text-white/50 text-xs font-mono mb-8">RESTRICTED AREA // AUTHORIZED PERSONNEL ONLY</p>

    <div th:if="${error}" class="bg-red-500/20 border border-red-500 text-red-200 p-3 mb-6 text-xs font-bold uppercase">
        <span th:text="${error}">Error</span>
    </div>

    <form action="/login" method="post" class="space-y-6">
        <div>
            <label class="block text-[#ff003c] text-xs font-bold uppercase tracking-widest mb-2">Operative ID</label>
            <input type="text" name="username" required class="w-full bg-black/50 border border-white/10 p-3 text-white focus:border-[#ff003c] outline-none">
        </div>
        <div>
            <label class="block text-[#ff003c] text-xs font-bold uppercase tracking-widest mb-2">Passcode</label>
            <input type="password" name="password" required class="w-full bg-black/50 border border-white/10 p-3 text-white focus:border-[#ff003c] outline-none">
        </div>
        <button type="submit" class="w-full bg-[#ff003c] text-black font-black uppercase tracking-widest py-3 hover:bg-white transition-all">
            Authenticate
        </button>
    </form>
    <div class="mt-6 text-center">
        <a href="/" class="text-white/30 hover:text-white text-xs uppercase">Abort / Return to Shop</a>
    </div>
</div>

</body>
</html>
